services:
- type: web
  name: pricesense-api
  env: python
  rootDir: api
  buildCommand: pip install -r requirements.txt
  startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
  envVars:
  - key: APP_LOG_LEVEL
    value: DEBUG
- type: web
  name: pricesense-frontend
  env: static
  rootDir: frontend
  buildCommand: npm ci && npm run build
  staticPublishPath: dist
  routes:
  - type: rewrite
    source: /connector-details/*
    destination: /index.html
  envVars:
  - key: VITE_API_URL
    value: https://pricesense-api.onrender.com
  - key: VITE_PROBUY_PRODUCT_SEARCH_API_BASE_URL
    value: https://pricesense-api.onrender.com
